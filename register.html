<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayan Cake - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🧁 Bayan Cake</h1>
        <p>Create your account</p>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="cakes.html">Our Cakes</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
    
    <main>
        <div class="form-container">
            <h2>Create New Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Choose a password (min 6 characters)" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2024 Bayan Cake. All rights reserved.</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
