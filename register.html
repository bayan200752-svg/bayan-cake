<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayan Cake - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🧁 Bayan Cake</h1>
        <p>Create your account</p>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="cakes.html">Our Cakes</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
    
    <main>
        <div class="form-container">
            <h2>Create New Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Choose a password (min 6 characters)" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2024 Bayan Cake. All rights reserved.</p>
    </footer>
    
    <script src="script.js"></script>
    <form id="registerForm">

<input type="text" id="name" placeholder="Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

    <script type="module">

// استيراد مكتبات Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// إعدادات مشروعك
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "bayan-cake.firebaseapp.com",
  databaseURL: "https://bayan-cake-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bayan-cake",
  storageBucket: "bayan-cake.appspot.com",
  messagingSenderId: "917092616507",
  appId: "1:917092616507:web:6e5e559187e8fd39100f1e"
};

// تشغيل Firebase
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// عند الضغط على زر التسجيل
document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const usersRef = ref(database, "users");

    push(usersRef,{
        name:name,
        email:email,
        password:password
    });

    alert("Registration Successful!");

});
</script>
</body>
</html>
